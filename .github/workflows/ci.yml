name: CI

on:
  push:
    branches: ["main"]
    tags-ignore: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: "."
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev --extra benchmark
      - name: Lint
        run: uv run ruff check memoryforge tests benchmarks
      - name: Type check
        run: uv run mypy memoryforge
      - name: Test unit and integration suite
        run: >
          uv run pytest
          --ignore=tests/test_real_subagents.py
          --cov=memoryforge
          --cov-report=term-missing
          --cov-fail-under=77
      - name: Verify real Codex sub-agent runner
        run: codex --version
      - name: Test real Codex sub-agents
        env:
          MEMORYFORGE_REAL_SUBAGENT: "1"
          MEMORYFORGE_REAL_PROJECT_ROOT: ${{ github.workspace }}
          MEMORYFORGE_SUBAGENT_RUNNER: codex
          MEMORYFORGE_MODEL: ${{ vars.MEMORYFORGE_REAL_MODEL || 'gpt-5.4' }}
        run: uv run pytest tests/test_real_subagents.py -vv
      - name: Build
        run: uv build
      - name: Check distributions
        run: uv run twine check dist/*
      - name: Smoke installed wheel
        run: |
          python -m venv .tmp/wheel-smoke
          .tmp/wheel-smoke/bin/python -m pip install dist/*.whl
          .tmp/wheel-smoke/bin/python -c "import memoryforge; import memoryforge.mcp.server"
          .tmp/wheel-smoke/bin/memoryforge --help
      - name: Synthetic benchmark
        run: env PYTHONPATH=. uv run python benchmarks/synthetic_test.py
      - name: Upload distributions
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: memoryforge-dist
          path: dist/*
